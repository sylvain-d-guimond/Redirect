<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 400px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h1 {
            font-size: 24px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        p {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        .url-display {
            background: rgba(255, 255, 255, 0.15);
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            opacity: 0.8;
        }

        .error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #fecaca;
        }

        .error h1 {
            color: #fca5a5;
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="spinner"></div>
        <h1>Redirecting...</h1>
        <p>Hold tight, taking you there now.</p>
        <div class="url-display" id="urlDisplay"></div>
    </div>

    <script>
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        function isValidUrl(string) {
            try {
                new URL(string);
                return true;
            } catch (_) {
                return false;
            }
        }

        window.addEventListener('load', function() {
            const target = getQueryParam('target');

            if (!target) {
                showError('No target URL provided', 'Add ?target=https://example.com to the URL');
                return;
            }

            if (!isValidUrl(targetUrl)) {
                showError('Invalid URL', targetUrl);
                return;
            }

            // Display the target URL
            document.getElementById('urlDisplay').textContent = targetUrl;

            // Redirect after a brief delay
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 1000);
        });

        function showError(title, message) {
            const container = document.getElementById('container');
            container.classList.add('error');
            container.innerHTML = `
                <h1>⚠️ ${title}</h1>
                <p>${message}</p>
                <div class="url-display">${message}</div>
            `;
            document.querySelector('.spinner').style.display = 'none';
        }
    </script>
</body>
</html>
